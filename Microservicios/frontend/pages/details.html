<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle Persona · PersonaMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/variables.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>

<body>
    <div class="app-wrapper">

        <div class="stripe"></div>

        <header class="navbar">
            <div class="container">
                <div class="navbar-inner">
                    <a href="../index.html" class="brand">
                        <span class="brand-dot"></span>
                        PersonaMS
                        <span class="brand-tag">v1.0</span>
                    </a>
                    <div class="navbar-status">
                        <span class="status-indicator"></span>
                        <span>localhost:8080</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="container">
                <div class="standalone-card" id="detail-card">

                    <a href="../index.html" class="back-link">
                        <svg viewBox="0 0 24 24" fill="none">
                            <polyline points="15 18 9 12 15 6" />
                        </svg>
                        Volver al listado
                    </a>

                    <div id="detail-content" class="state-box">
                        <div class="spinner"></div>
                        <p>Cargando persona…</p>
                    </div>

                </div>
            </div>
        </main>

        <div class="toast" id="toast" role="alert"><span id="toast-message"></span></div>

        <footer class="footer">
            <div class="container">
                <div class="footer-inner">
                    <span>PersonaMS &copy; 2025</span>
                    <span class="footer-api">GET /api/personas/:id</span>
                </div>
            </div>
        </footer>

    </div>
    <script type="module">
        import personaService from "../services/personaService.js";

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        function toast(msg, type = "success") {
            const t = document.getElementById("toast");
            const tm = document.getElementById("toast-message");
            tm.textContent = msg;
            t.className = `toast toast-${type} show`;
            clearTimeout(t._t);
            t._t = setTimeout(() => t.classList.remove("show"), 3200);
        }

        async function init() {
            const container = document.getElementById("detail-content");
            if (!id) { container.innerHTML = "<p>No se especificó un ID.</p>"; return; }

            try {
                const p = await personaService.buscarPorId(id);
                if (!p) { container.innerHTML = "<p>Persona no encontrada.</p>"; return; }

                const initial = (p.nombre || "?")[0].toUpperCase();
                container.className = "";
                container.innerHTML = `
        <div class="detail-avatar">${initial}</div>
        <div class="detail-name">${p.nombre}</div>
        <div class="detail-id">ID &mdash; ${p.id}</div>
        <div class="detail-fields">
          <div class="detail-row">
            <span class="detail-label">Dirección</span>
            <span class="detail-value">${p.direccion || "—"}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Teléfono</span>
            <span class="detail-value"><a href="tel:${p.telefono}">${p.telefono || "—"}</a></span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Correo</span>
            <span class="detail-value"><a href="mailto:${p.correo}">${p.correo || "—"}</a></span>
          </div>
        </div>
        <div class="detail-actions">
          <a href="edit.html?id=${p.id}" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            <span>Editar</span>
          </a>
          <button class="btn-danger" id="btn-eliminar">
            <svg viewBox="0 0 24 24" fill="none">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            </svg>
            Eliminar
          </button>
        </div>
      `;

                document.getElementById("btn-eliminar").addEventListener("click", async () => {
                    if (!confirm(`¿Eliminar a "${p.nombre}"? Esta acción no se puede deshacer.`)) return;
                    try {
                        await personaService.eliminar(p.id);
                        toast("Persona eliminada.", "info");
                        setTimeout(() => { window.location.href = "../index.html"; }, 1200);
                    } catch (err) {
                        toast("Error al eliminar.", "error");
                    }
                });

            } catch (err) {
                container.innerHTML = "<p>Error al cargar. ¿Está Spring Boot corriendo?</p>";
                console.error(err);
            }
        }

        init();
    </script>
</body>

</html>
