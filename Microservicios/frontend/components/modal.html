<div class="modal-backdrop" id="modal">
    <div class="modal-overlay" id="modal-overlay"></div>

    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-header">
            <h2 class="modal-title" id="modal-title">Nueva Persona</h2>
            <button class="btn-close" id="btn-cerrar-modal" aria-label="Cerrar modal">
                <svg viewBox="0 0 24 24" fill="none">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>

        <!-- data-mode="create|edit"  data-id="<id>" se asignan en JS -->
        <form id="persona-form" novalidate>
            <div class="form-grid">

                <div class="field">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Ana García" autocomplete="off" />
                    <span class="field-error hidden" id="error-nombre"></span>
                </div>

                <div class="field">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" name="direccion" placeholder="Ej. Calle 10 # 5-20, Bogotá"
                        autocomplete="off" />
                    <span class="field-error hidden" id="error-direccion"></span>
                </div>

                <div class="field">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Ej. +57 310 000 0000"
                        autocomplete="off" />
                    <span class="field-error hidden" id="error-telefono"></span>
                </div>

                <div class="field">
                    <label for="correo">Correo</label>
                    <input type="email" id="correo" name="correo" placeholder="Ej. ana@correo.com" autocomplete="off" />
                    <span class="field-error hidden" id="error-correo"></span>
                </div>

            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" id="btn-cancelar">Cancelar</button>
                <button type="submit" class="btn-primary">
                    <svg viewBox="0 0 24 24" fill="none">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    <span>Guardar</span>
                </button>
            </div>
        </form>
    </div>
</div>
